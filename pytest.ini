[pytest]
testpaths = tests
addopts = --cov=backend/app --cov-report=term-missing --cov-fail-under=70
omit =
    backend/app/main.py
    backend/app/pipeline/runner.py
    backend/app/pipeline/stage2_intent.py
    backend/app/pipeline/stage3_extract.py
    backend/app/pipeline/stage5_dedup.py
    backend/app/pipeline/stage6_enrich.py
    backend/app/pipeline/stage7_ticket.py
    backend/app/adapters/ollama_llm.py
    backend/app/adapters/local_mail.py
    backend/app/create_db.py
